<!DOCTYPE html>
<html>
<head>
  <title>404</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e0e7ff;
      color: #0b1324;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container { text-align: center; }
    h1 {
      font-size: 80px;
      margin: 0;
      font-weight: 600;
      letter-spacing: -1px;
    }
    h2 {
      margin: 10px 0 8px;
      font-weight: 500;
      opacity: 0.9;
    }
    .domain {
      color: #7f1d1d;
    }
    p {
      margin: 0;
      color: #3f4b63;
      font-size: 16px;
    }
    .accent {
      width: 40px;
      height: 3px;
      background: #4f46e5;
      margin: 16px auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="accent"></div>
    <h2><span class="domain" id="domain"></span> is not available</h2>
    <p>The page you are looking for does not exist.</p>
  </div>

  <script>
    document.getElementById("domain").textContent = window.location.hostname;
  </script>
</body>
</html>
